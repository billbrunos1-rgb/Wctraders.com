<!DOCTYPE html>
<html>
<head>
    <title>WC Traders Registration</title>

    <style>
        body {
            font-size: 24px;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 50px;
        }

        input, select {
            font-size: 22px;
            padding: 10px;
            width: 300px;
        }

        button {
            font-size: 24px;
            padding: 12px 25px;
        }
    </style>
</head>

<body>

    <h1>WC Traders Registration</h1>

    <form>
        <p>Full Name</p>
        <input type="text" required>

        <p>Email</p>
        <input type="email" required>

        <p>Phone Number</p>
        <input type="tel" required>

        <p>Experience Level</p>
        <select>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>

        <br><br>

        <button type="submit">Register</button>
    </form>

    <h2>Registration Fee</h2>

    <p>
        To complete your registration, send
        <strong>$35 USD</strong> to:
    </p>

    <p><strong>+254 141 711 482</strong></p>

    <p>
        After payment, send the payment confirmation through WhatsApp for verification and activation.
    </p>

    <br>

    <a href="index.html">Return Home</a>

</body>
</html>
